# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All secrets come from .env (never committed).
# Domain/URL overrides come from .env.prod.

services:
  # ── Nginx reverse proxy (TLS termination) ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Certbot (auto-renew Let's Encrypt) ────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

  # ── Database ──────────────────────────────────────────────────
  db:
    env_file:
      - .env
      - .env.prod
    ports: []  # close external access
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ── Backend API ───────────────────────────────────────────────
  backend:
    env_file:
      - .env
      - .env.prod
    ports: []  # only accessible via nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Worker ────────────────────────────────────────────────────
  worker:
    env_file:
      - .env
      - .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── Scheduler ─────────────────────────────────────────────────
  scheduler:
    env_file:
      - .env
      - .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Index checker ─────────────────────────────────────────────
  indexchecker:
    env_file:
      - .env
      - .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Migrate (one-shot) ────────────────────────────────────────
  migrate:
    env_file:
      - .env
      - .env.prod

  # ── Seed (one-shot) ──────────────────────────────────────────
  seed:
    env_file:
      - .env
      - .env.prod

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "https://sitegenai.alfasearch.ru"
    environment:
      NEXT_PUBLIC_API_URL: "https://sitegenai.alfasearch.ru"
    ports: []  # only accessible via nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Monitoring (internal only) ────────────────────────────────
  grafana:
    env_file:
      - .env
      - .env.prod
    ports: []  # close external access; access via SSH tunnel
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  redis:
    ports: []  # close external access
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  prometheus:
    ports: []  # close external access
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  loki:
    ports: []  # close external access
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  promtail:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
