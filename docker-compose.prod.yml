# version: "3.9"

services:
  db:
    image: postgres:16-alpine
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  migrate:
    image: codex-testing-pbn-generator:latest
    env_file: .env.prod
    environment:
      DB_CONNECT_RETRIES: "20"
      DB_CONNECT_INTERVAL: "1s"
      MIGRATE_ON_START: "true"
      DB_DRIVER: "${DB_DRIVER:-pgx}"
      DB_DSN: "${DB_DSN:-postgres://auth:auth@db:5432/auth?sslmode=disable}"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/migrate"]
    restart: "no"

  backend:
    image: codex-testing-pbn-generator:latest
    env_file: .env.prod
    environment:
      MIGRATE_ON_START: "false"
      DB_DRIVER: "${DB_DRIVER:-pgx}"
      DB_DSN: "${DB_DSN:-postgres://auth:auth@db:5432/auth?sslmode=disable}"
    user: "65532:65532"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:8080"
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata: {}
