# VPN IP whitelist
# $vpn_access = 1 — доступ разрешён, 0 — 403 Forbidden
#
# Чтобы добавить IP: добавь строку вида   <IP> 1;
# После изменения:  docker compose exec nginx nginx -s reload

geo $vpn_access {
    default         0;        # по умолчанию — заблокировано

    # ── VPN / разрешённые IP ─────────────────────────────────
    194.15.46.35    1;        # Outline VPN (s.shukurov)

    # ── Локальная Docker-сеть (внутренние healthcheck) ───────
    127.0.0.1       1;
    172.16.0.0/12   1;
    10.0.0.0/8      1;
    192.168.0.0/16  1;
}
