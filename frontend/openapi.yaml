components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
  parameters:
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
    DomainId:
      in: path
      name: domainId
      required: true
      schema:
        type: string
    CheckId:
      in: path
      name: checkId
      required: true
      schema:
        type: string
    ScheduleId:
      in: path
      name: scheduleId
      required: true
      schema:
        type: string
    GenerationId:
      in: path
      name: generationId
      required: true
      schema:
        type: string
    LinkId:
      in: path
      name: linkId
      required: true
      schema:
        type: string
    QueueItemId:
      in: path
      name: itemId
      required: true
      schema:
        type: string
    FilePath:
      in: path
      name: filePath
      required: true
      schema:
        type: string
      description: Путь внутри домена (может содержать `/`)
    FileId:
      in: path
      name: fileId
      required: true
      schema:
        type: string
    MemberEmail:
      in: path
      name: email
      required: true
      schema:
        type: string
    UserEmail:
      in: path
      name: email
      required: true
      schema:
        type: string
    PromptId:
      in: path
      name: promptId
      required: true
      schema:
        type: string
    AuditCode:
      in: path
      name: code
      required: true
      schema:
        type: string
    LinkTaskFilters:
      in: query
      name: status
      schema:
        type: string
      description: |
        Доп. фильтры передаются как query:
        status, scheduled_from/scheduledFrom, scheduled_to/scheduledTo, limit, page, search.
  responses:
    Error:
      description: Ошибка
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
    LockoutResponse:
      type: object
      properties:
        error:
          type: string
        retryIn:
          type: integer
      required: [error, retryIn]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        captchaId:
          type: string
        captchaAnswer:
          type: string
        captchaToken:
          type: string
      required: [email, password]
    LoginResponse:
      type: object
      properties:
        email:
          type: string
      required: [email]
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        captchaId:
          type: string
        captchaAnswer:
          type: string
        captchaToken:
          type: string
      required: [email, password]
    RegisterResponse:
      type: object
      properties:
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [email, createdAt]
    UserMe:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
        isApproved:
          type: boolean
        verified:
          type: boolean
        apiKeyUpdatedAt:
          type: string
          format: date-time
          nullable: true
        hasApiKey:
          type: boolean
        apiKeyPrefix:
          type: string
      required: [email, role, isApproved, verified, hasApiKey]
    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          description: Канонические статусы link-task
          enum: [pending, searching, removing, inserted, generated, removed, failed]
        target_country:
          type: string
        target_language:
          type: string
        timezone:
          type: string
          nullable: true
        default_server_id:
          type: string
          nullable: true
        global_blacklist:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        ownerHasApiKey:
          type: boolean
          nullable: true
      required: [id, name, status, created_at, updated_at]
    ProjectInput:
      type: object
      properties:
        name:
          type: string
        country:
          type: string
        language:
          type: string
        status:
          type: string
        timezone:
          type: string
      required: [name]
    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        country:
          type: string
        language:
          type: string
        status:
          type: string
        timezone:
          type: string
      required: [name]
    ProjectSummary:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/Project"
        domains:
          type: array
          items:
            $ref: "#/components/schemas/Domain"
        members:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMember"
        my_role:
          type: string
    ProjectMember:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [email, role]
    ProjectMemberInput:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
      required: [email]
    ProjectMemberUpdate:
      type: object
      properties:
        role:
          type: string
      required: [role]
    Domain:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        server_id:
          type: string
          nullable: true
        url:
          type: string
        main_keyword:
          type: string
          nullable: true
        target_country:
          type: string
          nullable: true
        target_language:
          type: string
          nullable: true
        exclude_domains:
