openapi: 3.0.3
info:
  title: Site Gen AI API
  version: "1.0"
  description: |
    API для управления проектами, доменами, расписаниями, очередью генерации и ссылками.
    Все временные поля возвращаются в UTC. Отображение на клиенте выполняется
    с учётом таймзоны проекта.
servers:
  - url: http://localhost:8080
security:
  - cookieAuth: []
tags:
  - name: Auth
    description: Аутентификация и профиль
  - name: Dashboard
    description: Сводка по проектам и метрики
  - name: Projects
    description: Управление проектами
  - name: Members
    description: Участники проекта
  - name: Domains
    description: Управление доменами
  - name: Schedules
    description: Расписания генерации
  - name: Link Schedules
    description: Расписания ссылок
  - name: Queue
    description: Очередь генерации
  - name: Generations
    description: Запуски генерации
  - name: Links
    description: Задачи по ссылкам
  - name: Files
    description: Файлы домена
  - name: Admin
    description: Административные операции
  - name: Index Checks
    description: Мониторинг индексации и проверки
paths:
  /api/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /api/login:
    post:
      tags: [Auth]
      summary: Вход
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: access_token и refresh_token
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "429":
          description: Слишком много попыток
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockoutResponse"
  /api/logout:
    post:
      tags: [Auth]
      summary: Выход из текущей сессии
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /api/logout-all:
    post:
      tags: [Auth]
      summary: Выход из всех сессий
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                keepCurrent:
                  type: boolean
      responses:
        "200":
          description: OK
  /api/refresh:
    post:
      tags: [Auth]
      summary: Обновить токены по refresh cookie
      security: []
      responses:
        "200":
          description: OK
        "401":
          $ref: "#/components/responses/Error"
  /api/me:
    get:
      tags: [Auth]
      summary: Текущий пользователь
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMe"
        "401":
          $ref: "#/components/responses/Error"
  /api/dashboard:
    get:
      tags: [Dashboard]
      summary: Сводка и метрики
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
  /api/projects:
    get:
      tags: [Projects]
      summary: Список проектов
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags: [Projects]
      summary: Создать проект
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}:
    get:
      tags: [Projects]
      summary: Проект по ID
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [Projects]
      summary: Обновить проект
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "201":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Projects]
      summary: Удалить проект
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
  /api/projects/{projectId}/summary:
    get:
      tags: [Projects]
      summary: Сводка проекта
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
  /api/projects/{projectId}/domains:
    get:
      tags: [Domains]
      summary: Домены проекта
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"
    post:
      tags: [Domains]
      summary: Добавить домен
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
  /api/projects/{projectId}/domains/import:
    post:
      tags: [Domains]
      summary: Импорт доменов списком
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainImportRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
  /api/projects/{projectId}/members:
    get:
      tags: [Members]
      summary: Список участников проекта
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
    post:
      tags: [Members]
      summary: Добавить участника
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /api/projects/{projectId}/members/{email}:
    patch:
      tags: [Members]
      summary: Изменить роль участника
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/MemberEmail"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectMemberUpdate"
      responses:
        "200":
          description: OK
    delete:
      tags: [Members]
      summary: Удалить участника
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/MemberEmail"
      responses:
        "200":
          description: OK
  /api/projects/{projectId}/schedules:
    get:
      tags: [Schedules]
      summary: Список расписаний генерации
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"
    post:
      tags: [Schedules]
      summary: Создать расписание генерации
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "409":
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/schedules/{scheduleId}:
    get:
      tags: [Schedules]
      summary: Расписание по ID
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    patch:
      tags: [Schedules]
      summary: Обновить расписание
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ScheduleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    delete:
      tags: [Schedules]
      summary: Удалить расписание
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: OK
  /api/projects/{projectId}/schedules/{scheduleId}/trigger:
    post:
      tags: [Schedules]
      summary: Ручной запуск генерации по расписанию
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "202":
          description: Запуск поставлен в очередь
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleTriggerResult"
  /api/projects/{projectId}/link-schedule:
    get:
      tags: [Link Schedules]
      summary: Расписание ссылок
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LinkSchedule"
                  - type: "null"
    put:
      tags: [Link Schedules]
      summary: Upsert расписания ссылок
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkScheduleInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkSchedule"
    delete:
      tags: [Link Schedules]
      summary: Удалить расписание ссылок
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
  /api/projects/{projectId}/link-schedule/trigger:
    post:
      tags: [Link Schedules]
      summary: Ручной запуск задач ссылок
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "202":
          description: Запуск поставлен в очередь
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkScheduleTriggerResult"
  /api/projects/{projectId}/queue:
    get:
      tags: [Queue]
      summary: Очередь проекта
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueItem"
  /api/projects/{projectId}/queue/history:
    get:
      tags: [Queue]
      summary: История очереди проекта
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [all, completed, failed]
        - in: query
          name: date_from
          schema:
            type: string
            format: date
        - in: query
          name: date_to
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueItem"
  /api/projects/{projectId}/queue/cleanup:
    post:
      tags: [Queue]
      summary: Очистить устаревшие элементы очереди
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueCleanupResult"
  /api/domains:
    get:
      tags: [Domains]
      summary: Домены по списку ID
      parameters:
        - in: query
          name: ids
          schema:
            type: string
          description: Список ID доменов через запятую
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Domain"
  /api/domains/{domainId}:
    get:
      tags: [Domains]
      summary: Домен по ID
      parameters:
        - $ref: "#/components/parameters/DomainId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
    patch:
      tags: [Domains]
      summary: Обновить домен
      parameters:
        - $ref: "#/components/parameters/DomainId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Domain"
    delete:
      tags: [Domains]
      summary: Удалить домен
      parameters:
        - $ref: "#/components/parameters/DomainId"
      responses:
        "200":
          description: OK
  /api/domains/{domainId}/generate:
    post:
      tags: [Generations]
      summary: Запуск генерации домена
      parameters:
        - $ref: "#/components/parameters/DomainId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "202":
          description: Принято
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateAccepted"
        "409":
          $ref: "#/components/responses/Error"
  /api/domains/{domainId}/generations:
    get:
      tags: [Generations]
      summary: Список генераций домена
      parameters:
        - $ref: "#/components/parameters/DomainId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Generation"
  /api/domains/{domainId}/summary:
    get:
      tags: [Domains]
      summary: Сводка домена
      parameters:
        - $ref: "#/components/parameters/DomainId"
        - in: query
          name: gen_limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - in: query
          name: link_limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainSummary"
  /api/domains/{domainId}/links:
    get:
      tags: [Links]
      summary: Список link tasks домена
      parameters:
        - $ref: "#/components/parameters/DomainId"
        - $ref: "#/components/parameters/LinkTaskFilters"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkTask"
    post:
      tags: [Links]
      summary: Создать link task домена
      parameters:
        - $ref: "#/components/parameters/DomainId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkTaskCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkTask"
  /api/domains/{domainId}/links/import:
    post:
      tags: [Links]
      summary: Импорт link tasks CSV/JSON
      parameters:
        - $ref: "#/components/parameters/DomainId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkTaskImportRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
  /api/domains/{domainId}/link/run:
    post:
      tags: [Links]
      summary: Запуск link task домена (insert)
      parameters:
        - $ref: "#/components/parameters/DomainId"
      responses:
        "200":
          description: Updated existing task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkTask"
        "201":
          description: Created new task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkTask"
  /api/domains/{domainId}/link/remove:
    post:
      tags: [Links]
      summary: Запуск link task домена (remove)
      parameters:
        - $ref: "#/components/parameters/DomainId"
      responses:
        "200":
          description: Updated existing task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkTask"
        "201":
          description: Created new task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkTask"
  /api/domains/{domainId}/files:
    get:
      tags: [Files]
      summary: Список файлов домена
      parameters:
        - $ref: "#/components/parameters/DomainId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/File"
  /api/domains/{domainId}/files/{filePath}:
    get:
      tags: [Files]
      summary: Получить файл домена
      parameters:
        - $ref: "#/components/parameters/DomainId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileContent"
    put:
      tags: [Files]
      summary: Обновить файл домена
      parameters:
        - $ref: "#/components/parameters/DomainId"
        - $ref: "#/components/parameters/FilePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUpdate"
      responses:
        "200":
          description: OK
    delete:
      tags: [Files]
      summary: Удалить файл домена
      parameters:
        - $ref: "#/components/parameters/DomainId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: OK
  /api/domains/{domainId}/files/{fileId}/history:
    get:
      tags: [Files]
      summary: История изменений файла
      parameters:
        - $ref: "#/components/parameters/DomainId"
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileEdit"
  /api/generations:
    get:
      tags: [Generations]
      summary: Список генераций
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: lite
          description: "Если true/1, возвращает список без logs/artifacts для ускорения"
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Generation"
  /api/generations/{generationId}:
    get:
      tags: [Generations]
      summary: Генерация по ID
      parameters:
        - $ref: "#/components/parameters/GenerationId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Generation"
    patch:
      tags: [Generations]
      summary: Действие с генерацией (pause/resume/cancel)
      parameters:
        - $ref: "#/components/parameters/GenerationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerationAction"
      responses:
        "200":
          description: OK
    delete:
      tags: [Generations]
      summary: Удалить генерацию
      parameters:
        - $ref: "#/components/parameters/GenerationId"
      responses:
        "200":
          description: OK
  /api/links:
    get:
      tags: [Links]
      summary: Список link tasks (с фильтрами)
      parameters:
        - $ref: "#/components/parameters/LinkTaskFilters"
        - in: query
          name: domain_id
          schema:
            type: string
        - in: query
          name: project_id
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkTask"
  /api/links/{linkId}:
    get:
      tags: [Links]
      summary: Получить link task
      parameters:
        - $ref: "#/components/parameters/LinkId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
