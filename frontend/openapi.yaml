  # ── AI Agent ───────────────────────────────────────────
  /api/domains/{domainId}/agent:
    post:
      tags: [AI Agent]
      summary: Запустить или переподключиться к сессии AI-агента (SSE)
      description: |
        Запускает автономного AI-агента, который может читать и редактировать файлы домена.
        Ответ — поток Server-Sent Events (SSE).
        Типы событий: `session_start`, `text`, `tool_start`, `tool_done`,
        `file_changed`, `done`, `error`, `stopped`.
      parameters:
        - $ref: "#/components/parameters/DomainId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentStartRequest"
      responses:
        "200":
          description: SSE-поток событий агента
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/domains/{domainId}/agent/sessions:
    get:
      tags: [AI Agent]
      summary: Список сессий агента для домена
      parameters:
