      parameters:
        - $ref: "#/components/parameters/DomainId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileLockRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  # ── Legacy Import ──────────────────────────────────────
  /api/projects/{projectId}/legacy-import/preview:
    post:
      tags: [Legacy Import]
      summary: Превью импорта legacy-данных
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain_ids:
                  type: array
                  items:
                    type: string
              required: [domain_ids]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegacyImportPreviewItem"
  /api/projects/{projectId}/legacy-import:
    post:
      tags: [Legacy Import]
      summary: Запустить legacy-импорт
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegacyImportRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                required: [job_id]
    get:
      tags: [Legacy Import]
      summary: Список import-джобов проекта
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegacyImportJob"
  /api/projects/{projectId}/legacy-import/{jobId}:
    get:
      tags: [Legacy Import]
      summary: Детали import-джоба с элементами
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyImportJobDetail"
        "404":
          $ref: "#/components/responses/Error"
  # ── Link Schedule Eligibility ──────────────────────────
  /api/projects/{projectId}/link-schedule-eligibility:
    get:
      tags: [Link Schedules]
      summary: Проверить готовность доменов к следующему запуску ссылок
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkScheduleEligibilityResponse"
  # ── Infrastructure ─────────────────────────────────────
  /healthz:
    get:
      tags: [Infrastructure]
      summary: Проверка здоровья сервиса
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /metrics:
    get:
      tags: [Infrastructure]
      summary: Метрики Prometheus
      security: []
      responses:
        "200":
          description: Prometheus text format
          content:
            text/plain:
              schema:
                type: string
